name: CI

on:
  push:
    branches: [main, assignment-5]
  pull_request:
    branches: [main, assignment-5]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the PROMPTS.md SHA-provenance test can resolve
          # the per-phase commit hashes (a shallow clone would skip it).
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install deps
        run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/ scripts/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ scripts/
      - name: File-size guard (<=150 LOC)
        run: uv run python scripts/check_file_sizes.py
      - name: Pytest with coverage
        run: uv run pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
