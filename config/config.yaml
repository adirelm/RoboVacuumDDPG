version: "1.0.1"

# ---- DDPG agent (from scratch; brief Lecture-09 DDPG) ----
ddpg:
  gamma: 0.99            # discount factor γ (justify in docs/ANALYSIS.md)
  tau: 0.005             # Polyak soft-update coefficient τ (brief example value)
  lr_actor: 1.0e-4       # actor learning rate
  lr_critic: 1.0e-3      # critic learning rate (faster than actor — standard DDPG)
  batch_size: 128
  buffer_size: 1000000   # replay capacity
  hidden_sizes: [256, 256]
  grad_clip: 1.0         # gradient-norm clip (stability)
  warmup_steps: 1000     # random actions before learning starts

# ---- Exploration noise (brief mandates GAUSSIAN, not OU) ----
noise:
  type: gaussian
  sigma_start: 0.2       # initial Gaussian std added to actions in [-1, 1]
  sigma_end: 0.05
  sigma_decay_steps: 50000

# ---- 2D simulator (from scratch; NO Gymnasium / Gazebo) ----
env:
  n_rays: 16             # lidar rays; ablation knob (8 / 16 / 24)
  # heading cue is fixed cos/sin of the bearing to the nearest uncleaned cell
  # (2 dims; continuous, no ±π wrap) — emitted unconditionally by state.py, so
  # there is no switchable knob to configure here.
  # state_dim = n_rays + 2 (v, omega) + 2 (cos/sin heading) = 20 at the default 16 rays
  ray_max: 5.0           # max lidar range (m); ray distances normalized by this
  dt: 0.1                # kinematic integration timestep (s)
  v_max: 0.5             # max linear velocity (m/s) = throttle * v_max
  omega_max: 1.5         # max angular velocity (rad/s) = steer * omega_max
  robot_radius: 0.17     # vacuum body radius (m)
  clean_radius: 0.17     # cleaning footprint radius (m)
  coverage_cell: 0.10    # coverage grid cell edge (m)
  max_steps: 1000        # steps per episode
  coverage_target: 0.9   # episode ends when this fraction of free cells is cleaned (or max_steps)

# ---- Reward shaping: r = k_coverage*Δcells - k_collision*hit - k_step ----
reward:
  k_coverage: 1.0
  k_collision: 10.0
  k_step: 0.01

# ---- Training / evaluation ----
training:
  episodes: 500
  # NOTE: periodic in-loop evaluation is not implemented; Trainer.train returns a
  # full per-episode history (reward + coverage + critic loss) and final greedy
  # evaluation runs via RoboVacuumSDK.evaluate, so no `eval_every` cadence knob.
  seeds: [42, 7, 123, 314, 271]

# ---- HouseExpo maps (real dataset; full ~35k git-ignored; curated subset vendored) ----
maps:
  dataset_repo: "https://github.com/TeaganLi/HouseExpo"
  # Pinned to the real HouseExpo HEAD as of fetch; stamped by scripts/fetch_houseexpo.py.
  dataset_sha: "45e2b2505f6ea1fe49c0203f14efb7ce20b94e7c"
  # HouseExpo verts/bbox are already in METRES; 1.0 keeps them metric (PRD-HOUSEEXPO §5).
  coord_scale: 1.0
  # Path of the gzipped-tar of all JSON maps inside the upstream repo (no 7z needed).
  archive_path: "HouseExpo/json.tar.gz"
  train: ["room_single", "apt_small", "apt_multi"]
  holdout: ["apt_large", "office"]
  # Logical curated name -> real HouseExpo map id (the file is <id>.json in the dataset).
  # Spans single-room -> multi-room by room_num; fetch_houseexpo.py copies these into data/maps/.
  curated_ids:
    room_single: "011bef0381ddca9381a7aeb1d0b0777d"   # room_num=1
    apt_small: "000514ade3bcc292a613a4c2755a5050"      # room_num=3
    apt_multi: "0016652bf7b3ec278d54e0ef94476eb8"      # room_num=5
    apt_large: "0099c392987b98355e984f7d06837dbc"      # room_num=6
    office: "041bd68db15bac8be2d96ca062c23d2f"         # room_num=8

paths:
  maps_dir: "data/maps"
  results_dir: "results"

logging:
  level: "INFO"

gui:                          # Pygame live viewer (scripts/play.py)
  window_width: 900
  window_height: 620
  fps: 60
  train_steps_per_frame: 4    # env/training steps advanced per rendered frame (speed)
  trail_length: 400           # max path-trail points kept
  demo_checkpoint: "assets/demo_policy.pt"
